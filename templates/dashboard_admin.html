<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
    <header>

        <h2>CampusVoice</h2>
        <nav>
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>
    <main>

        <h1>Halo, {{ nama }}!</h1>

        <p>
            Selamat datang di Dashboard Admin. Pilih menu yang ingin digunakan.
        </p>

        <div class="cards">

            <div class="card">

                <div class="icon">🤖</div>

                <h3>Kelola Keluhan</h3>

                <p>
                    Lihat seluruh keluhan mahasiswa
                </p>

                <a href="{{ url_for('kelola_keluhan') }}">
                    <button>Buka</button>
                </a>

            </div>

            <div class="card">
                <div class="icon">📋</div>
                <h3>Data Mahasiswa</h3>
                <p>
                    Daftar akun mahasiswa
                </p>
                <button>Coming Soon</button>
            </div>

        </div>
    </main>
</body>
</html>
