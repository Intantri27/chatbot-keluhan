<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Keluhan Mahasiswa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 420px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #6a2d2d;
            color: white;
            padding: 16px 20px;
            text-align: center;
        }

        .chat-header h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .chat-body {
            height: 420px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .bubble.bot {
            background-color: #f5e8e8;
            color: #431b1b;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .bubble.user {
            background-color: #6a2d2d;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bubble.kategori {
            background-color: #fff3cd;
            color: #856404;
            align-self: flex-start;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .chat-footer {
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 8px;
        }

        .chat-footer input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }

        .chat-footer input:focus {
            border-color: #6a2d2d;
        }

        .chat-footer button {
            background-color: #6a2d2d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-footer button:hover {
            background-color: #431b1b;
        }

        .typing {
            font-size: 12px;
            color: #aaa;
            align-self: flex-start;
            padding: 4px 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Chatbot Keluhan Mahasiswa</h2>
            <p>Universitas Harapan Negeri</p>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="bubble bot">
                Halo! Saya adalah asisten keluhan mahasiswa Universitas Harapan Negeri. Sampaikan keluhanmu dan saya akan meneruskannya ke pihak yang tepat. 😊
            </div>
        </div>

        <div class="chat-footer">
            <input 
                type="text" 
                id="inputKeluhan" 
                placeholder="Tulis keluhanmu di sini..." 
                onkeypress="handleEnter(event)"
            />
            <button onclick="kirimKeluhan()">➤</button>
        </div>
    </div>

    <script>
        function handleEnter(event) {
            if (event.key === 'Enter') {
                kirimKeluhan();
            }
        }

        function tambahBubble(teks, tipe) {
            const chatBody = document.getElementById('chatBody');
            const bubble = document.createElement('div');
            bubble.classList.add('bubble', tipe);
            bubble.textContent = teks;
            chatBody.appendChild(bubble);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function tambahKategori(kategori) {
            const chatBody = document.getElementById('chatBody');
            const badge = document.createElement('div');
            badge.classList.add('bubble', 'kategori');
            badge.textContent = '📂 Kategori: ' + kategori;
            chatBody.appendChild(badge);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        async function kirimKeluhan() {
            const input = document.getElementById('inputKeluhan');
            const teks = input.value.trim();

            if (!teks) return;

            // Tampilkan pesan user
            tambahBubble(teks, 'user');
            input.value = '';

            // Tampilkan indikator mengetik
            const chatBody = document.getElementById('chatBody');
            const typing = document.createElement('div');
            typing.classList.add('typing');
            typing.id = 'typing';
            typing.textContent = 'Bot sedang memproses...';
            chatBody.appendChild(typing);

            try {
                const response = await fetch('/prediksi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ teks: teks })
                });

                const data = await response.json();

                // Hapus indikator mengetik
                document.getElementById('typing').remove();

                // Tampilkan kategori dan respon
                tambahKategori(data.kategori);
                tambahBubble(data.respon, 'bot');

            } catch (error) {
                document.getElementById('typing').remove();
                tambahBubble('Maaf, terjadi kesalahan. Silakan coba lagi.', 'bot');
            }
        }
    </script>
</body>
</html>
